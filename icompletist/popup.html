<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ICompletist</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>ICompletist</h1>
    <div class="header-actions">
      <button id="open-tab-btn" title="Open in tab (recommended for large batches)">⇱</button>
      <button id="settings-btn" title="Settings">⚙</button>
    </div>
  </header>

  <section id="input-section">
    <div class="mode-toggle">
      <button id="mode-id-btn" class="mode-btn active" data-mode="id">Fetch by ID</button>
      <button id="mode-search-btn" class="mode-btn" data-mode="search">Search by query</button>
    </div>

    <label for="subfolder">Save to subfolder of Downloads/</label>
    <input type="text" id="subfolder" placeholder="icompletist" value="icompletist">

    <!-- FETCH BY ID PANEL -->
    <div id="id-panel">
      <label for="dois" style="margin-top: 12px;">Paste identifiers (DOI, arXiv ID, or OpenReview ID — one per line)</label>
      <textarea id="dois" rows="7" placeholder="10.1038/nature12373&#10;arXiv:2103.00020&#10;openreview.net/forum?id=...&#10;10.1101/2024.01.01.000000  (bioRxiv)&#10;10.1109/...  (IEEE)"></textarea>
      <div class="row">
        <button id="fetch-btn" class="primary">Fetch articles</button>
        <button id="clear-btn">Clear</button>
      </div>
    </div>

    <!-- SEARCH BY QUERY PANEL -->
    <div id="search-panel" hidden>
      <label for="query-text" style="margin-top: 12px;">Query (one group per line, lines joined by AND / OR / AND NOT)</label>
      <textarea id="query-text" rows="5" placeholder="plant OR vegetation OR crop&#10;AND pathogen OR disease OR pest&#10;AND NOT wheat OR rice"></textarea>
      <div id="query-error" class="query-error" hidden></div>

      <div class="search-controls">
        <div class="control-group">
          <label>Year range</label>
          <div class="year-row">
            <input type="number" id="year-from" placeholder="From" min="1900" max="2100">
            <span>—</span>
            <input type="number" id="year-to" placeholder="To" min="1900" max="2100">
          </div>
        </div>

        <div class="control-group">
          <label for="field-select">Match in</label>
          <select id="field-select">
            <option value="title-abs-keywords">Title + Abstract + Keywords</option>
            <option value="title-abs">Title + Abstract</option>
            <option value="title">Title only</option>
            <option value="all">All fields</option>
          </select>
        </div>

        <div class="control-group">
          <label>Document type</label>
          <div class="checkbox-row">
            <label><input type="checkbox" class="doctype-cb" value="article" checked> Article</label>
            <label><input type="checkbox" class="doctype-cb" value="review" checked> Review</label>
            <label><input type="checkbox" class="doctype-cb" value="conference-paper"> Conference</label>
            <label><input type="checkbox" class="doctype-cb" value="book-chapter"> Book chapter</label>
          </div>
        </div>

        <div class="control-group">
          <label>Databases</label>
          <div class="checkbox-row">
            <label><input type="checkbox" class="source-cb" value="pubmed" checked> PubMed</label>
            <label><input type="checkbox" class="source-cb" value="semanticscholar" checked> Semantic Scholar</label>
            <label><input type="checkbox" class="source-cb" value="core"> CORE</label>
            <label><input type="checkbox" class="source-cb" value="scopus"> Scopus</label>
            <label><input type="checkbox" class="source-cb" value="ieee"> IEEE Xplore</label>
          </div>
        </div>

        <div class="control-group">
          <label for="limit-input">Per-source limit</label>
          <input type="number" id="limit-input" value="500" min="10" max="10000" step="10">
        </div>
      </div>

      <div class="row">
        <button id="search-btn" class="primary">Run search</button>
        <button id="search-clear-btn">Clear</button>
      </div>
    </div>
  </section>

  <section id="progress-section" hidden>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-text">Initializing…</div>
    <div class="stats">
      <span class="stat pmc">PMC: <b id="stat-pmc">0</b></span>
      <span class="stat oa">OA: <b id="stat-oa">0</b></span>
      <span class="stat inst">Institutional: <b id="stat-inst">0</b></span>
      <span class="stat tdm">TDM API: <b id="stat-tdm">0</b></span>
      <span class="stat fail">Unavailable: <b id="stat-fail">0</b></span>
    </div>
    <button id="cancel-btn">Cancel</button>
  </section>

  <section id="results-section" hidden>
    <h2>Results</h2>
    <ul id="results-list"></ul>
    <button id="reset-btn">New batch</button>
  </section>

  <section id="history-section">
    <div class="history-header">
      <h2>Recent runs <span id="history-count" class="muted-count">0</span></h2>
      <button id="history-clear" class="ghost-btn danger">Clear</button>
    </div>
    <select id="run-select"></select>
    <ul id="run-results"></ul>
    <div class="history-controls" id="run-actions" hidden>
      <button id="refill-btn" class="ghost-btn">Re-fill textarea with this run's DOIs</button>
      <button id="download-pdfs-btn" class="ghost-btn" hidden>Download PDFs for this batch</button>
      <button id="export-run-btn" class="ghost-btn">Export RIS (for Zotero)</button>
    </div>
  </section>

  <script src="popup.js" type="module"></script>
</body>
</html>
